primaryColor = "#F59E0B"
backgroundColor = "#0A0B0E"
secondaryBackgroundColor = "#111318"
textColor = "#E2E8F0"
font = "sans serif"

[logger]
level = "info"

[server]
maxUploadSize = 200
enableXsrfProtection = true
